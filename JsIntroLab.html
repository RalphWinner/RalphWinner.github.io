/* runs test to see if expected argument is === to value returned by function2test argument */
function myFunctionTest(expected, found) {
  if (expected === found) {
    return "TEST SUCCEEDED";
  } else {
    return "TEST FAILED.  Expected " + expected + " found " + found;
  }
}

/* max returns the maximum of 2 arguments */
function max(a, b) {
  if (a > b) {
    return a;
  } else {
    return b;
  };
}
console.log("Expected output of max(20,10) is 20  " + myFunctionTest(20, max(20, 10)));

/* max3 takes 3 numbers as arguments and returns the largest */
function maxOfThree(a, b, c) {
  return max(max(a, b), c);

}

console.log("Expected output of maxOfThree(5,4,44) is 44  " + myFunctionTest(44, maxOfThree(5, 4, 44)));
console.log("Expected output of maxOfThree(55,4,44) is 55  " + myFunctionTest(55, maxOfThree(55, 4, 44)));


/* Is Vowel */

function isVowel(c) {
    return ['a', 'e', 'i', 'o', 'u'].indexOf(c.toLowerCase()) !== -1
}
console.log("Expected output of isVowel('A') is true  " + myFunctionTest(true, isVowel('A')));
console.log("Expected output of isVowel('B') is false  " + myFunctionTest(false, isVowel('B')));

//4 function sum() with reduce :
      function sum(array) {
        return array.reduce((acc, curr) => {
          acc += curr;
          return acc;
        }, 0);
      }
      console.log(
        "Expected output of sum([1,2,3,4]) is 10  " +
          myFunctionTest(10, sum([1, 2, 3, 4]))
      );

      //4 function multiply() with reduce :
      function multiply(array) {
        return array.reduce((acc, curr) => {
          acc *= curr;
          return acc;
        }, 1);
      }
      console.log(
        "Expected output of product([1,2,3,4]) is 24  " +
          myFunctionTest(24, multiply([1, 2, 3, 4]))
      );

//5 funtion reverse() with map :
      function reverse(str) {
        // let arrStr = str.split(''); //splits a word to character array.
        let arrStr = str.split(" ");
        let res = [];
        arrStr.map(w => {
            let wArr = w.split('');
            let temp = [];
            wArr.map(c => temp.unshift(c));
            res.unshift(temp.join(""));
        });
        return res.join(" ");
      }

      console.log(
        'Expected output of reverse("jag testar") is "ratset gaj" ' +
          myFunctionTest("ratset gaj", reverse("jag testar"))
      );

      //6 findLongestWord()
      function findLongestWord(array){
        var max_value = 0;
        for (var i = array.length - 1; i >= 0; i--) {
          max_value = max(max_value, array[i].length);
        }
        return max_value;
      }

      console.log(
        'Expected output of findLongestWord(["beta", "alpha male", "zeta", "delta"]) is 10 ' +
          myFunctionTest(10, findLongestWord(["beta", "alpha male", "zeta", "delta"]))
      );

      //7 funtion filterLongWords()
      function filterLongWords(array, wordLengthToCompareWith) {
        const new_arr = [];
        for (var i = array.length - 1; i >= 0; i--) {
          if(array[i].length > wordLengthToCompareWith){
            new_arr.push(array[i]);
          }
        }
        return new_arr;
      }

      }, 1);

      console.log(" ===> "+ b);
      console.log(" ===> "+ c);
